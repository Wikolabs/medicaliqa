version: "3.9"

# medicaliqa demo - production-ready POC.
# 2 services orchestrated:
#   - medicaliqa (Next.js frontend on host port 3043)
#   - medicaliqa-backend (FastAPI Python, internal only on 8000)
# Shared external network wkdemo-net (created once by deploy.yml) avoids
# Docker default address-pool exhaustion across all 47 LP stacks.

services:
  medicaliqa-backend:
    image: ghcr.io/wikolabs/medicaliqa-backend:latest
    container_name: medicaliqa-backend
    restart: unless-stopped
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    networks:
      - wkdemo_net

  medicaliqa:
    image: ghcr.io/wikolabs/medicaliqa:latest
    container_name: medicaliqa
    restart: unless-stopped
    ports:
      - "3043:3000"
    environment:
      BACKEND_URL: "http://medicaliqa-backend:8000"
    depends_on:
      - medicaliqa-backend
    networks:
      - wkdemo_net

networks:
  wkdemo_net:
    name: wkdemo-net
    external: true
